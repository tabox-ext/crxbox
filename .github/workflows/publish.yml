name: publish
on:
  release:
    types: [published]
  # Manual publish from the Actions tab as a fallback.
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for npm trusted publishing (OIDC) + provenance
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'
      # Trusted publishing (OIDC) requires npm >= 11.5.1; Node 22 ships an older npm.
      - run: npm install -g npm@latest
      - run: npm ci
      # Re-verify on the exact released commit before publishing.
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test:unit
      - run: npm run build
      - run: npm run check:size
      # Guard: when triggered by a release, the tag must match the package version.
      - name: Verify tag matches package.json version
        if: github.event_name == 'release'
        run: |
          PKG_VERSION="v$(node -p "require('./package.json').version")"
          TAG="${{ github.event.release.tag_name }}"
          if [ "$PKG_VERSION" != "$TAG" ]; then
            echo "::error::Release tag $TAG does not match package.json version $PKG_VERSION"
            exit 1
          fi
      # No token: npm auto-detects the GitHub OIDC environment and authenticates
      # via the trusted publisher configured for this package on npmjs.com.
      # Provenance is generated automatically; access:public comes from publishConfig.
      - run: npm publish
